version: "3.9"

services:
  # --- Backend API Server ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hercules-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend/app:/app/app  # Hot reload in dev
    restart: unless-stopped
    networks:
      - hercules-network

  # --- Redis Cache ---
  redis:
    image: redis:7-alpine
    container_name: hercules-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - hercules-network

  # --- PostgreSQL Database ---
  postgres:
    image: postgres:16-alpine
    container_name: hercules-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: hercules
      POSTGRES_PASSWORD: hercules_dev
      POSTGRES_DB: hercules_ai
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - hercules-network

volumes:
  redis-data:
  postgres-data:

networks:
  hercules-network:
    driver: bridge
